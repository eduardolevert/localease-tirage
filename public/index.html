<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Fans Day 2026 — Inscription</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="card">
    <div class="logo-container">
      <img src="/images/localease-logo.jpeg" alt="Localease" />
      <img src="/images/opsecure-logo.jpeg" alt="La Chaîne EV" />
    </div>

    <h1>Electric Fans Day 2026</h1>
    <h2>Tirage au sort Localease ⚡</h2>
    <p>6 juin 2026 — Hippodrome de La Teste de Buch</p>

    <form id="form-inscription">
      <input
        type="text"
        name="nom"
        placeholder="Votre prénom et nom"
        required
        autocomplete="name"
      />
      <input
        type="email"
        name="email"
        placeholder="Votre adresse email"
        required
        autocomplete="email"
      />
      <button type="submit" class="btn-primary">⚡ Je participe !</button>
    </form>

    <div id="message" style="display:none;"></div>
  </div>

  <script>
    // ── Confetti ────────────────────────────────────────────────
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    const colors = ['#053980', '#7FFFD4', '#ffffff', '#FFD700'];
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: -10,
        r: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        speedY: Math.random() * 3 + 1.5,
        speedX: (Math.random() - 0.5) * 2,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.15,
        opacity: 1,
        shape: Math.random() > 0.5 ? 'rect' : 'circle'
      };
    }

    function drawParticle(p) {
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function launchConfetti(loop) {
      if (animationId) cancelAnimationFrame(animationId);
      particles = [];
      let frames = 0;
      const maxFrames = loop ? Infinity : 180;

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frames++;
        if (frames < maxFrames || loop) {
          if (frames % 3 === 0) {
            for (let i = 0; i < 5; i++) particles.push(createParticle());
          }
        }
        particles.forEach((p, i) => {
          p.y += p.speedY;
          p.x += p.speedX;
          p.rotation += p.rotSpeed;
          if (p.y > canvas.height) {
            if (loop) {
              particles[i] = createParticle();
            } else {
              p.opacity -= 0.05;
            }
          }
          drawParticle(p);
        });
        particles = particles.filter(p => p.opacity > 0);
        if (particles.length > 0 || frames < maxFrames) {
          animationId = requestAnimationFrame(animate);
        }
      }
      animate();
    }

    // Confetti uniquement sur les gagnants — pas au chargement

    // ── Auto-redirect if already registered ─────────────────────
    window.addEventListener('load', async () => {
      const savedEmail = localStorage.getItem('efd_email');
      if (savedEmail) {
        try {
          const res = await fetch('/api/status/' + encodeURIComponent(savedEmail));
          if (res.ok) {
            const data = await res.json();
            if (data.tirageEffectue) {
              window.location.href = '/resultat.html?email=' + encodeURIComponent(savedEmail);
            }
          }
        } catch (e) { /* ignore */ }
      }
    });

    // ── Form submit ──────────────────────────────────────────────
    const form = document.getElementById('form-inscription');
    const msgDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgDiv.style.display = 'none';
      msgDiv.className = '';
      msgDiv.textContent = '';

      const nom = form.nom.value.trim();
      const email = form.email.value.trim();

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, email })
        });

        if (res.ok) {
          form.style.display = 'none';
          msgDiv.style.display = 'block';
          msgDiv.className = 'success-msg';
          msgDiv.textContent = '🎉 Vous êtes inscrit(e) ! Bonne chance pour le tirage !';
          localStorage.setItem('efd_email', email);
          launchConfetti(false);
        } else if (res.status === 409) {
          msgDiv.style.display = 'block';
          msgDiv.className = 'error-msg';
          msgDiv.textContent = 'Vous êtes déjà inscrit(e) avec cet email !';
        } else {
          const data = await res.json().catch(() => ({}));
          msgDiv.style.display = 'block';
          msgDiv.className = 'error-msg';
          msgDiv.textContent = data.message || 'Une erreur est survenue. Veuillez réessayer.';
        }
      } catch (err) {
        msgDiv.style.display = 'block';
        msgDiv.className = 'error-msg';
        msgDiv.textContent = 'Erreur de connexion. Veuillez réessayer.';
      }
    });
  </script>
</body>
</html>
