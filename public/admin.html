<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Administration — Tirage au sort</title>
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .card { max-width: 600px; }
    #admin-panel { display: none; }
  </style>
</head>
<body>
  <div class="card">
    <h1 style="margin-bottom:24px;">Administration — Tirage au sort</h1>

    <!-- Login -->
    <div id="login-section">
      <input type="password" id="admin-key" placeholder="Clé admin" />
      <button class="btn-primary" id="btn-login">Se connecter</button>
      <div id="login-msg" style="margin-top:12px;"></div>
    </div>

    <!-- Admin panel -->
    <div id="admin-panel">
      <div id="stats" class="stats-box">Chargement des statistiques…</div>

      <!-- Gestion des lots -->
      <div id="lots-section" style="margin-bottom:20px;">
        <h2 style="font-size:16px;color:#053980;margin-bottom:10px;">🎁 Lots à gagner</h2>
        <p style="font-size:13px;color:#666;margin-bottom:12px;">Le nombre de lots détermine le nombre de gagnants tirés au sort.</p>
        <div id="lots-list"></div>
        <button class="btn-secondary" id="btn-add-lot" style="margin-top:10px;font-size:14px;padding:10px 16px;">+ Ajouter un lot</button>
        <button class="btn-primary" id="btn-save-lots" style="margin-top:10px;font-size:14px;padding:10px 16px;">💾 Enregistrer les lots</button>
        <div id="lots-msg" style="margin-top:8px;font-size:13px;"></div>
      </div>

      <button class="btn-primary" id="btn-tirage">🎲 Lancer le tirage au sort</button>

      <div id="winners-list"></div>

      <hr class="divider" />

      <button class="btn-secondary" id="btn-reset">🔄 Réinitialiser tout</button>

      <div style="margin-top:12px;text-align:center;">
        <button class="btn-secondary" id="btn-export" style="background:#e8f4fd;color:#053980;border:1.5px solid #053980;">
          📥 Exporter les inscrits (CSV)
        </button>
        <p style="font-size:12px;color:#888;margin-top:6px;">Fichier CSV avec nom, email, date, statut et lot — s'ouvre dans Excel, compatible tous outils marketing</p>
      </div>

      <!-- Liste des inscrits -->
      <div id="participants-section" style="margin-top:28px;">
        <h2 style="font-size:16px;color:#053980;margin-bottom:12px;">👥 Liste des inscrits</h2>
        <input type="text" id="search-input" placeholder="🔍 Rechercher par nom ou email…" style="margin-bottom:12px;" oninput="filterParticipants()" />
        <div id="participants-list"></div>
      </div>
  </div>

  <script>
    let adminKey = '';

    const loginSection = document.getElementById('login-section');
    const adminPanel = document.getElementById('admin-panel');
    const loginMsg = document.getElementById('login-msg');
    const statsDiv = document.getElementById('stats');
    const winnersDiv = document.getElementById('winners-list');
    let allParticipants = [];

    // ── Login ────────────────────────────────────────────────────
    document.getElementById('btn-login').addEventListener('click', async () => {
      const key = document.getElementById('admin-key').value.trim();
      if (!key) {
        showLoginMsg('Veuillez entrer la clé admin.', 'error');
        return;
      }
      try {
        const res = await fetch('/api/admin/stats?key=' + encodeURIComponent(key));
        if (res.ok) {
          adminKey = key;
          const data = await res.json();
          loginSection.style.display = 'none';
          adminPanel.style.display = 'block';
          showStats(data);
          allParticipants = data.participants || [];
          renderParticipants(allParticipants);
          renderLotsForms(data.lots || []);
        } else if (res.status === 403) {
          showLoginMsg('Clé incorrecte.', 'error');
        } else {
          showLoginMsg('Erreur serveur. Réessayez.', 'error');
        }
      } catch (e) {
        showLoginMsg('Erreur de connexion.', 'error');
      }
    });

    // Allow Enter key on password field
    document.getElementById('admin-key').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('btn-login').click();
    });

    function showLoginMsg(msg, type) {
      loginMsg.textContent = msg;
      loginMsg.className = type === 'error' ? 'error-msg' : 'success-msg';
      loginMsg.style.display = 'block';
    }

    function showStats(data) {
      const nbLots = (data.lots || []).length;
      statsDiv.innerHTML = `👥 Participants inscrits : <strong>${data.total}</strong>
        &nbsp;|&nbsp; 🎁 Lots configurés : <strong>${nbLots}</strong> (= ${nbLots} gagnant${nbLots > 1 ? 's' : ''})
        ${data.tirageEffectue ? ' &nbsp;|&nbsp; 🎲 Tirage effectué' : ''}`;
    }

    // ── Gestion des lots ──────────────────────────────────────────
    function renderLotsForms(lots) {
      const container = document.getElementById('lots-list');
      container.innerHTML = '';
      if (!lots.length) { addLotRow(container, '', ''); return; }
      lots.forEach(l => addLotRow(container, l.titre, l.description));
    }

    function addLotRow(container, titre, description) {
      const div = document.createElement('div');
      div.className = 'lot-row';
      div.style.cssText = 'border:1px solid #e0e0e0;border-radius:10px;padding:12px;margin-bottom:10px;background:#fafafa;';
      div.innerHTML = `
        <div style="display:flex;gap:8px;align-items:center;margin-bottom:6px;">
          <input type="text" class="lot-titre" placeholder="Nom du lot (ex: Casque de vélo)" value="${escapeHtml(titre)}"
            style="flex:1;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;" />
          <button onclick="this.closest('.lot-row').remove()" style="background:none;border:none;font-size:18px;cursor:pointer;color:#999;padding:4px 8px;" title="Supprimer">✕</button>
        </div>
        <textarea class="lot-desc" placeholder="Description du lot (optionnel)" rows="2"
          style="width:100%;padding:8px 12px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:13px;box-sizing:border-box;resize:vertical;">${escapeHtml(description)}</textarea>
      `;
      container.appendChild(div);
    }

    document.getElementById('btn-add-lot').addEventListener('click', () => {
      addLotRow(document.getElementById('lots-list'), '', '');
    });

    document.getElementById('btn-save-lots').addEventListener('click', async () => {
      const rows  = document.querySelectorAll('.lot-row');
      const lots  = Array.from(rows).map(r => ({
        titre:       r.querySelector('.lot-titre').value.trim(),
        description: r.querySelector('.lot-desc').value.trim()
      })).filter(l => l.titre);

      const lotsMsg = document.getElementById('lots-msg');
      try {
        const res = await fetch('/api/admin/lots', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminKey, lots })
        });
        const data = await res.json();
        if (res.ok) {
          lotsMsg.style.color = '#053980';
          lotsMsg.textContent = `✅ ${data.lots.length} lot${data.lots.length > 1 ? 's' : ''} enregistré${data.lots.length > 1 ? 's' : ''}.`;
          // Refresh stats
          const sr = await fetch('/api/admin/stats?key=' + encodeURIComponent(adminKey));
          if (sr.ok) showStats(await sr.json());
        } else {
          lotsMsg.style.color = '#e53935';
          lotsMsg.textContent = data.error || 'Erreur lors de la sauvegarde.';
        }
      } catch(e) {
        lotsMsg.style.color = '#e53935';
        lotsMsg.textContent = 'Erreur de connexion.';
      }
    });

    // ── Tirage ────────────────────────────────────────────────────
    document.getElementById('btn-tirage').addEventListener('click', async () => {
      if (!confirm('Êtes-vous sûr de vouloir lancer le tirage ?')) return;

      try {
        const res = await fetch('/api/tirage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminKey })
        });
        const data = await res.json();
        if (res.ok) {
          renderWinners(data.winners || []);
          // Refresh stats + participants
          const sr = await fetch('/api/admin/stats?key=' + encodeURIComponent(adminKey));
          if (sr.ok) {
            const sd = await sr.json();
            showStats(sd);
            allParticipants = sd.participants || [];
            renderParticipants(allParticipants);
          }
        } else {
          alert(data.error || data.message || 'Erreur lors du tirage.');
        }
      } catch (e) {
        alert('Erreur de connexion.');
      }
    });

    function renderWinners(winners) {
      if (!winners.length) {
        winnersDiv.innerHTML = '<p class="pending-msg">Aucun gagnant sélectionné.</p>';
        return;
      }
      let html = '<h2 style="margin:16px 0 8px;font-size:16px;color:#053980;">🏆 Gagnants</h2>';
      html += '<ul class="winners-list">';
      winners.forEach((w, i) => {
        const lotInfo = w.lot ? `<br><span style="font-size:12px;color:#053980;background:#e8f4fd;padding:2px 8px;border-radius:4px;margin-top:3px;display:inline-block;">🎁 ${escapeHtml(w.lot.titre)}</span>` : '';
        html += `<li><span class="num">${i + 1}.</span> <strong>${escapeHtml(w.nom)}</strong> — ${escapeHtml(w.email)}${lotInfo}</li>`;
      });
      html += '</ul>';
      winnersDiv.innerHTML = html;
    }

    // ── Export CSV ────────────────────────────────────────────────
    document.getElementById('btn-export').addEventListener('click', () => {
      window.location.href = '/api/admin/export?key=' + encodeURIComponent(adminKey);
    });

    // ── Reset ─────────────────────────────────────────────────────
    document.getElementById('btn-reset').addEventListener('click', async () => {
      if (!confirm('Voulez-vous vraiment réinitialiser toutes les données ?')) return;
      if (!confirm('⚠️ CONFIRMATION FINALE — Cette action est irréversible. Continuer ?')) return;

      try {
        const res = await fetch('/api/admin/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ adminKey })
        });
        const data = await res.json();
        if (res.ok) {
          winnersDiv.innerHTML = '';
          allParticipants = [];
          renderParticipants([]);
          statsDiv.innerHTML = '✅ Données réinitialisées. 0 participant.';
          alert('Réinitialisation effectuée.');
        } else {
          alert(data.message || 'Erreur lors de la réinitialisation.');
        }
      } catch (e) {
        alert('Erreur de connexion.');
      }
    });

    function escapeHtml(str) {
      return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Participants list ─────────────────────────────────────────
    function renderParticipants(list) {
      const div = document.getElementById('participants-list');
      if (!list.length) {
        div.innerHTML = '<p class="pending-msg" style="font-size:14px;">Aucun inscrit pour le moment.</p>';
        return;
      }
      const winners = Array.from(document.querySelectorAll('.winners-list li'))
        .map(li => li.textContent);
      let html = `<table style="width:100%;border-collapse:collapse;font-size:14px;">
        <thead>
          <tr style="background:#053980;color:white;">
            <th style="padding:8px 10px;text-align:left;">#</th>
            <th style="padding:8px 10px;text-align:left;">Nom</th>
            <th style="padding:8px 10px;text-align:left;">Email</th>
          </tr>
        </thead><tbody>`;
      list.forEach((p, i) => {
        const bg = i % 2 === 0 ? '#f9f9f9' : 'white';
        html += `<tr style="background:${bg};">
          <td style="padding:7px 10px;color:#888;">${i + 1}</td>
          <td style="padding:7px 10px;font-weight:500;">${escapeHtml(p.nom)}</td>
          <td style="padding:7px 10px;color:#444;">${escapeHtml(p.email)}</td>
        </tr>`;
      });
      html += '</tbody></table>';
      html += `<p style="font-size:12px;color:#888;margin-top:8px;text-align:right;">${list.length} résultat${list.length > 1 ? 's' : ''}</p>`;
      div.innerHTML = html;
    }

    function filterParticipants() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      if (!q) {
        renderParticipants(allParticipants);
        return;
      }
      const filtered = allParticipants.filter(p =>
        (p.nom || '').toLowerCase().includes(q) ||
        (p.email || '').toLowerCase().includes(q)
      );
      renderParticipants(filtered);
    }
  </script>
</body>
</html>
