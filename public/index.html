<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Electric Fans Day 2026 — Inscription</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <canvas id="confetti"></canvas>

  <div class="card">
    <div class="logo-container">
      <img src="/images/localease-logo.jpeg" alt="Localease" />
      <img src="/images/opsecure-logo.jpeg" alt="La Chaîne EV" />
    </div>

    <h1>Electric Fans Day 2026</h1>
    <h2>Tirage au sort Localease ⚡</h2>
    <p class="event-date">6 juin 2026 — Hippodrome de La Teste de Buch</p>

    <div id="lots-display"></div>

    <form id="form-inscription">
      <input
        type="text"
        name="nom"
        placeholder="Votre prénom et nom"
        required
        autocomplete="name"
      />
      <input
        type="email"
        name="email"
        placeholder="Votre adresse email"
        required
        autocomplete="email"
      />
      <div style="display:flex;align-items:flex-start;gap:10px;margin:8px 0 4px;">
        <input type="checkbox" id="rgpd" name="rgpd" required
          style="width:18px;height:18px;min-width:18px;margin-top:2px;accent-color:#053980;cursor:pointer;" />
        <label for="rgpd" style="font-size:13px;color:#555;line-height:1.5;cursor:pointer;">
          J'accepte que mes données personnelles (nom et email) soient collectées par Localease dans le cadre de ce tirage au sort, conformément au
          <a href="https://www.localease.fr/politique-de-confidentialit%C3%A9-localease" target="_blank" style="color:#053980;">RGPD</a>.
          Ces données ne seront pas transmises à des tiers sans mon consentement.
        </label>
      </div>

      <button type="submit" class="btn-primary">⚡ Je participe !</button>
    </form>

    <div id="message" style="display:none;"></div>
  </div>

  <script>
    // ── Confetti ────────────────────────────────────────────────
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    const colors = ['#053980', '#7FFFD4', '#ffffff', '#FFD700'];
    let particles = [];
    let animationId = null;

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function createParticle() {
      return {
        x: Math.random() * canvas.width,
        y: -10,
        r: Math.random() * 6 + 3,
        color: colors[Math.floor(Math.random() * colors.length)],
        speedY: Math.random() * 3 + 1.5,
        speedX: (Math.random() - 0.5) * 2,
        rotation: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.15,
        opacity: 1,
        shape: Math.random() > 0.5 ? 'rect' : 'circle'
      };
    }

    function drawParticle(p) {
      ctx.save();
      ctx.globalAlpha = p.opacity;
      ctx.fillStyle = p.color;
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rotation);
      if (p.shape === 'rect') {
        ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r / 2, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function launchConfetti(loop) {
      if (animationId) cancelAnimationFrame(animationId);
      particles = [];
      let frames = 0;
      const maxFrames = loop ? Infinity : 180;

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        frames++;
        if (frames < maxFrames || loop) {
          if (frames % 6 === 0) {
            for (let i = 0; i < 2; i++) particles.push(createParticle());
          }
        }
        particles.forEach((p, i) => {
          p.y += p.speedY;
          p.x += p.speedX;
          p.rotation += p.rotSpeed;
          if (p.y > canvas.height) {
            if (loop) {
              particles[i] = createParticle();
            } else {
              p.opacity -= 0.05;
            }
          }
          drawParticle(p);
        });
        particles = particles.filter(p => p.opacity > 0);
        if (particles.length > 0 || frames < maxFrames) {
          animationId = requestAnimationFrame(animate);
        }
      }
      animate();
    }

    // Confetti uniquement sur les gagnants — pas au chargement

    // ── Charger et afficher les lots ─────────────────────────────
    async function loadLots() {
      try {
        const res = await fetch('/api/lots');
        if (!res.ok) return;
        const data = await res.json();
        const lots = data.lots || [];
        const div  = document.getElementById('lots-display');
        if (!lots.length) { div.style.display = 'none'; return; }
        let html = `<div style="margin:16px 0;background:#f0f8ff;border-radius:12px;padding:16px;">
          <p style="font-weight:700;color:#053980;margin:0 0 10px;font-size:15px;">🎁 Lots à gagner :</p>
          <ul style="list-style:none;padding:0;margin:0;">`;
        lots.forEach(l => {
          html += `<li style="padding:6px 0;border-bottom:1px solid #ddeeff;display:flex;align-items:flex-start;gap:8px;">
            <span style="color:#7FFFD4;font-size:18px;line-height:1.2;">⚡</span>
            <span>
              <strong style="color:#053980;">${escapeHtml(l.titre)}</strong>
              ${l.description ? `<br><span style="font-size:13px;color:#555;">${escapeHtml(l.description)}</span>` : ''}
            </span>
          </li>`;
        });
        html += '</ul></div>';
        div.innerHTML = html;
      } catch(e) { /* silencieux */ }
    }
    loadLots();

    // ── Auto-redirect if already registered ─────────────────────
    window.addEventListener('load', async () => {
      // Vérifier si le tirage est déjà effectué
      try {
        const res = await fetch('/api/status/check-tirage');
        if (res.ok) {
          const data = await res.json();
          if (data.tirageEffectue) {
            document.getElementById('form-inscription').style.display = 'none';
            const msg = document.getElementById('message');
            msg.style.display = 'block';
            msg.className = 'error-msg';
            msg.style.cssText = 'display:block;background:#fff3e0;border-radius:12px;padding:16px;text-align:center;color:#e65100;font-size:15px;font-weight:600;';
            msg.innerHTML = '⏰ Le tirage au sort est terminé.<br><span style="font-size:13px;font-weight:400;color:#555;">Les inscriptions sont closes.</span>';
            return;
          }
        }
      } catch(e) { /* silencieux */ }

      // Redirect si déjà inscrit et tirage effectué
      const savedEmail = localStorage.getItem('efd_email');
      if (savedEmail) {
        try {
          const res = await fetch('/api/status/' + encodeURIComponent(savedEmail));
          if (res.ok) {
            const data = await res.json();
            if (data.tirageEffectue) {
              window.location.href = '/resultat.html?email=' + encodeURIComponent(savedEmail);
            }
          }
        } catch (e) { /* ignore */ }
      }
    });

    // ── Form submit ──────────────────────────────────────────────
    const form = document.getElementById('form-inscription');
    const msgDiv = document.getElementById('message');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msgDiv.style.display = 'none';
      msgDiv.className = '';
      msgDiv.textContent = '';

      const nom = form.nom.value.trim();
      const email = form.email.value.trim();

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nom, email })
        });

        if (res.ok) {
          form.style.display = 'none';
          msgDiv.style.display = 'block';
          msgDiv.className = 'success-msg';
          msgDiv.innerHTML = '🎉 Vous êtes inscrit(e) ! Bonne chance pour le tirage !<br><br><span style="font-size:14px;color:#e65100;font-weight:600;">⚠️ Ne fermez pas cet onglet — votre résultat apparaîtra ici lors du tirage !</span>';
          localStorage.setItem('efd_email', email);
          launchConfetti(false);
        } else if (res.status === 409) {
          msgDiv.style.display = 'block';
          msgDiv.className = 'error-msg';
          msgDiv.textContent = 'Vous êtes déjà inscrit(e) avec cet email !';
        } else {
          const data = await res.json().catch(() => ({}));
          msgDiv.style.display = 'block';
          msgDiv.className = 'error-msg';
          msgDiv.textContent = data.message || 'Une erreur est survenue. Veuillez réessayer.';
        }
      } catch (err) {
        msgDiv.style.display = 'block';
        msgDiv.className = 'error-msg';
        msgDiv.textContent = 'Erreur de connexion. Veuillez réessayer.';
      }
    });
  </script>
</body>
</html>
